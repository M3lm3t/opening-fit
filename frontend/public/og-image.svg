<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="OpeningFit chess opening analysis preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050713"/>
      <stop offset="0.54" stop-color="#0b1629"/>
      <stop offset="1" stop-color="#06111e"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#44d682"/>
      <stop offset="1" stop-color="#49a8ff"/>
    </linearGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7d979"/>
      <stop offset="1" stop-color="#44d682"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#ffffff" stroke-opacity="0.07"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1050" cy="84" r="280" fill="#44d682" opacity="0.12"/>
  <circle cx="120" cy="560" r="320" fill="#49a8ff" opacity="0.14"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.55"/>

  <g transform="translate(74 72)">
    <rect x="0" y="0" width="68" height="68" rx="16" fill="#1d8cf8"/>
    <text x="34" y="45" text-anchor="middle" font-size="34" font-family="Arial, Helvetica, sans-serif" font-weight="700" fill="#020617">♞</text>
    <text x="88" y="42" font-family="Inter, Arial, Helvetica, sans-serif" font-size="34" font-weight="800" fill="#f8fafc">OpeningFit</text>
  </g>

  <g transform="translate(74 186)">
    <text font-family="Inter, Arial, Helvetica, sans-serif" font-size="66" font-weight="900" fill="#f8fafc">
      <tspan x="0" y="0">Find the openings</tspan>
      <tspan x="0" y="78">that actually fit</tspan>
      <tspan x="0" y="156">your games</tspan>
    </text>
    <text x="0" y="220" font-family="Inter, Arial, Helvetica, sans-serif" font-size="27" font-weight="600" fill="#b9c7d8">
      Chess.com + Lichess reports with one clear action.
    </text>
    <g transform="translate(0 266)" font-family="Inter, Arial, Helvetica, sans-serif" font-size="20" font-weight="800">
      <rect x="0" y="0" width="122" height="42" rx="21" fill="#44d682" fill-opacity="0.16" stroke="#44d682" stroke-opacity="0.48"/>
      <text x="28" y="27" fill="#b6ffd2">Keep</text>
      <rect x="136" y="0" width="146" height="42" rx="21" fill="#f7d979" fill-opacity="0.16" stroke="#f7d979" stroke-opacity="0.48"/>
      <text x="164" y="27" fill="#ffe7a6">Improve</text>
      <rect x="296" y="0" width="124" height="42" rx="21" fill="#ff6b6b" fill-opacity="0.14" stroke="#ff6b6b" stroke-opacity="0.44"/>
      <text x="326" y="27" fill="#ffd1d1">Avoid</text>
    </g>
  </g>

  <g transform="translate(724 104)" filter="url(#shadow)">
    <rect width="392" height="420" rx="30" fill="#0d1729" stroke="#2b4563"/>
    <rect x="26" y="26" width="340" height="72" rx="20" fill="#111f35" stroke="#263d57"/>
    <text x="48" y="58" font-family="Inter, Arial, Helvetica, sans-serif" font-size="16" font-weight="900" fill="#95a5ba">OPENING FIT SCORE</text>
    <text x="292" y="76" text-anchor="middle" font-family="Inter, Arial, Helvetica, sans-serif" font-size="48" font-weight="900" fill="#b6ffd2">72</text>

    <rect x="26" y="120" width="340" height="92" rx="20" fill="#0f1f32" stroke="#2d6c52"/>
    <text x="48" y="152" font-family="Inter, Arial, Helvetica, sans-serif" font-size="16" font-weight="900" fill="#95a5ba">TOP RECOMMENDATION</text>
    <text x="48" y="184" font-family="Inter, Arial, Helvetica, sans-serif" font-size="26" font-weight="900" fill="#f8fafc">Keep the Caro-Kann</text>

    <g transform="translate(26 236)" font-family="Inter, Arial, Helvetica, sans-serif">
      <rect width="104" height="86" rx="18" fill="#102435" stroke="#2c674d"/>
      <text x="18" y="31" font-size="15" font-weight="900" fill="#b6ffd2">KEEP</text>
      <text x="18" y="60" font-size="18" font-weight="900" fill="#f8fafc">61%</text>
      <rect x="118" width="104" height="86" rx="18" fill="#102136" stroke="#68582f"/>
      <text x="136" y="31" font-size="15" font-weight="900" fill="#ffe7a6">IMPROVE</text>
      <text x="136" y="60" font-size="18" font-weight="900" fill="#f8fafc">London</text>
      <rect x="236" width="104" height="86" rx="18" fill="#251827" stroke="#6e343c"/>
      <text x="254" y="31" font-size="15" font-weight="900" fill="#ffd1d1">AVOID</text>
      <text x="254" y="60" font-size="18" font-weight="900" fill="#f8fafc">Queen</text>
    </g>

    <g transform="translate(26 348)">
      <rect width="340" height="46" rx="18" fill="url(#warm)"/>
      <text x="170" y="30" text-anchor="middle" font-family="Inter, Arial, Helvetica, sans-serif" font-size="18" font-weight="900" fill="#06111e">Practise the Advance line</text>
    </g>
  </g>
</svg>
